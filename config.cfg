# [general modes]: if no modes is set, will use naive mode
CYLINDER 0
ESTIMATE_CAMERA 1
TRANS 0
# if no modes above is set, use naive mode

ORDERED_INPUT 1				# images are ordered left-to-right (faster, more reliable)
CROP 1								# crop the result to a rectangle
MAX_OUTPUT_SIZE 12000	# larger canvas for a wide football pitch panorama
LAZY_READ	1						# use images lazily and release when not needed.
											# save memory in feature stage, but slower in blending

# Focal length in 35mm-equivalent mm. Used by the camera estimator for spherical
# reprojection. Set to 0 to auto-estimate from the matched homography — preferred
# when the actual lens focal length is unknown (sports cameras vary 70–400mm+).
# If auto-estimate produces bad results, plug in your lens's 35mm-equiv value.
FOCAL_LENGTH 0 # auto-estimate from homography
#FOCAL_LENGTH 37  # typical wide-angle (jk's camera)
#FOCAL_LENGTH 100 # typical sideline sports zoom
#FOCAL_LENGTH 200 # longer sports telephoto

# [keypoint related parameters]:
# Football pitches are low-texture (uniform green). Use a larger working
# resolution and relaxed thresholds to find enough features on grass.
SIFT_WORKING_SIZE 1200	# higher res finds more features in low-texture regions
NUM_OCTAVE 4
NUM_SCALE 7
SCALE_FACTOR 1.4142135623
GAUSS_SIGMA 1.4142135623
GAUSS_WINDOW_FACTOR 6	# larger value gives less feature

CONTRAST_THRES 1e-2  # lowered from 4e-2: finds features in low-contrast grass areas

JUDGE_EXTREMA_DIFF_THRES 1e-3 # lowered from 2e-3: more keypoint candidates on uniform surfaces

EDGE_RATIO 12  # raised from 6: accept more edge-like features (pitch lines are edges)

PRE_COLOR_THRES 2e-2   # lowered from 5e-2: keeps more candidates before contrast filter
CALC_OFFSET_DEPTH 4
OFFSET_THRES 0.5
# ----

# [descriptor and matching related]:
ORI_RADIUS 4.5

ORI_HIST_SMOOTH_COUNT 2
DESC_HIST_SCALE_FACTOR 3
DESC_INT_FACTOR 512

MATCH_REJECT_NEXT_RATIO 0.85 # raised from 0.8: accept slightly less distinctive matches

# use more iteration if hard to find match
RANSAC_ITERATIONS 5000 # more attempts increases chance of finding a tight minimal set
# Inlier threshold in pixels at 800px working size. Scales up with image resolution,
# so tighter values force RANSAC to commit to more accurate correspondences.
RANSAC_INLIER_THRES 2.5 # tightened from 3.5: reduces geometric offset at seam

INLIER_IN_MATCH_RATIO 0.05	# lowered from 0.1: pitch images have fewer inliers
INLIER_IN_POINTS_RATIO 0.02 # lowered from 0.04: same reason
# ----

# [optimization and tuning]
STRAIGHTEN 1
SLOPE_PLAIN 8e-3
LM_LAMBDA 1  # lowered from 5: less regularization lets BA fine-tune camera params more aggressively
MULTIPASS_BA 2
# 0: only perform one-pass bundle adjustment for all images and connections (fast)
# 1: perform BA for each image added (suggested)
# 2: perform BA for each connection found (best quality, slow)
# ---

# [blending]
MULTIBAND 6	# 6 bands covers full resolution range from fine detail to coarse color gradients
