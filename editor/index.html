<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="/src/styles.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OpenSideline</title>
        <script type="module" src="/src/main.ts" defer></script>
    </head>

    <body>
        <main class="container">
            <h1 class="title">OpenSideline</h1>
            <p class="description">
                Generate a virtual camera path from a football video.
            </p>

            <div class="form-group">
                <label class="label" for="video_path">Video File</label>
                <div class="input-row">
                    <input
                        id="video_path"
                        class="input"
                        placeholder="No file selected…"
                        readonly
                    />
                    <button id="video_select" class="btn btn-outline">
                        Browse
                    </button>
                </div>
            </div>

            <div id="progressContainer" style="display: none">
                <div class="form-group">
                    <div class="progress-header">
                        <label class="label">Progress</label>
                        <span id="progressText" class="muted-text"></span>
                    </div>
                    <div class="progress">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                </div>
            </div>

            <div id="logContainer" style="display: none">
                <div class="form-group">
                    <label class="label">Log</label>
                    <pre id="output" class="log-output"></pre>
                </div>
            </div>

            <div class="button-row">
                <button id="start_button" class="btn btn-primary">
                    Generate
                </button>
                <button id="load_vcam" class="btn btn-outline">
                    Load .vcam.json
                </button>
            </div>

            <div id="viewerSection" style="display: none">
                <div class="viewer-toolbar">
                    <select id="viewerMode" class="select">
                        <option value="panorama">Panorama</option>
                        <option value="virtual">Virtual Camera</option>
                    </select>
                    <span id="timeDisplay" class="muted-text">0:00 / 0:00</span>
                    <button id="export_button" class="btn btn-outline btn-sm">
                        Export
                    </button>
                </div>

                <div id="exportContainer" style="display: none">
                    <div class="form-group">
                        <div class="progress-header">
                            <label class="label">Export</label>
                            <span id="exportText" class="muted-text"></span>
                        </div>
                        <div class="progress">
                            <div id="exportBar" class="progress-bar"></div>
                        </div>
                    </div>
                </div>
                <div id="videoWrapper">
                    <video id="viewerVideo" preload="auto"></video>
                </div>
                <div class="playback-controls">
                    <button id="playPause" class="btn btn-outline btn-sm">
                        Play
                    </button>
                    <input
                        id="scrubber"
                        type="range"
                        class="scrubber"
                        min="0"
                        max="100"
                        step="0.001"
                        value="0"
                    />
                </div>
            </div>
        </main>
    </body>
</html>
